<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkMe Themes Gallery</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="background-gradient"></div>
    
    <main class="container">
        <header class="header">
            <h1 class="title">LinkMe Themes</h1>
            <p class="subtitle">Explore beautiful link-in-bio designs</p>
        </header>

        <div class="gallery">
            <div class="theme-card">
                <div class="card-header">
                    <div class="theme-icon aurora-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
                        </svg>
                    </div>
                    <div class="theme-info">
                        <h2 class="theme-name">Aurora</h2>
                        <p class="theme-desc">Fire & Northern Lights</p>
                    </div>
                </div>
                <div class="iframe-wrapper">
                    <iframe src="Aurora/index.html" title="Aurora Theme" loading="lazy"></iframe>
                </div>
                <a href="Aurora/index.html" target="_blank" class="view-btn">
                    <span>View Full</span>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                </a>
            </div>

            <div class="theme-card">
                <div class="card-header">
                    <div class="theme-icon cloud-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/>
                        </svg>
                    </div>
                    <div class="theme-info">
                        <h2 class="theme-name">Cloud</h2>
                        <p class="theme-desc">Midnight Sky & Stars</p>
                    </div>
                </div>
                <div class="iframe-wrapper">
                    <iframe src="Cloud/index.html" title="Cloud Theme" loading="lazy"></iframe>
                </div>
                <a href="Cloud/index.html" target="_blank" class="view-btn">
                    <span>View Full</span>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                </a>
            </div>

            <div class="theme-card">
                <div class="card-header">
                    <div class="theme-icon glass-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/>
                        </svg>
                    </div>
                    <div class="theme-info">
                        <h2 class="theme-name">Glass</h2>
                        <p class="theme-desc">Rainy City Vibes</p>
                    </div>
                </div>
                <div class="iframe-wrapper">
                    <iframe src="Glass/index.html" title="Glass Theme" loading="lazy"></iframe>
                </div>
                <a href="Glass/index.html" target="_blank" class="view-btn">
                    <span>View Full</span>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                </a>
            </div>
        </div>

        <footer class="footer">
            <p>Built with passion for beautiful web experiences</p>
        </footer>
    </main>
</body>
</html>
